name: Bug Report
description: Report a bug in Runway
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Runway Version
      description: "Found in Runway > About Runway"
      placeholder: "e.g., 0.2.0"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS Version
      description: "Found in Apple menu > About This Mac"
      placeholder: "e.g., macOS 15.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Crash log or screenshot
      description: "Optional: paste any crash logs or attach a screenshot"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Terminal / Sessions
        - PR Dashboard
        - Sidebar / Navigation
        - Git Worktrees
        - Status Detection
        - Theme / Appearance
        - Menu Bar
        - Settings
        - Other
    validations:
      required: true
