name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's frustrating or missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Optional: other approaches you thought about"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Terminal / Sessions
        - PR Dashboard
        - Sidebar / Navigation
        - Git Worktrees
        - Status Detection
        - Theme / Appearance
        - GitHub Issues Integration
        - Menu Bar
        - Settings
        - Other
    validations:
      required: true
