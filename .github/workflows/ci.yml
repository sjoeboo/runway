name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Single job to minimize macOS runner minutes (free tier: 10x cost multiplier)
  build-and-test:
    name: Build, Test & Lint
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test 2>&1

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict

      - name: Install swift-format
        run: brew install swift-format

      - name: Check Formatting
        run: |
          swift-format lint --strict --recursive Sources/ Tests/ 2>&1
          if [ $? -ne 0 ]; then
            echo "::error::Code formatting issues found. Run 'swift-format format --recursive --in-place Sources/ Tests/' locally to fix."
            exit 1
          fi
